events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80;

        # ── BLOCK INTERNAL ROUTES (must come first) ──────
        location ^~ /api/users/internal/    { return 403; }
        location ^~ /api/products/internal/ { return 403; }
        location ^~ /api/orders/internal/   { return 403; }

        # ── USER SERVICE ──────────────────────────────────
        location /api/users/ {
            limit_req zone=api burst=20 nodelay;

            set $user_service http://user-service:8000;
            proxy_pass $user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── PRODUCT SERVICE ───────────────────────────────
        location /api/products/ {
            limit_req zone=api burst=30 nodelay;

            set $product_service http://product-service:8000;
            proxy_pass $product_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── ORDER SERVICE ─────────────────────────────────
        location /api/orders/ {
            limit_req zone=api burst=10 nodelay;

            set $order_service http://order-service:8000;
            proxy_pass $order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── HEALTH CHECK ──────────────────────────────────
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}